<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dawn Galaxy Atlas</title>
<style>
:root{
  --bg:#060A12;
  --panel:#0B1424;
  --panel2:#101B2D;
  --stroke:rgba(180,205,235,.20);
  --stroke2:rgba(180,205,235,.12);
  --text:#E7EEF9;
  --muted:rgba(231,238,249,.74);
  --grid:rgba(160,190,225,.27);
  --accent:#7CC3FF;
  --accent2:#FFD166;
  --danger:#FF5C7A;
  --violet:#B58CFF;
  --focus:rgba(255,209,102,.92);
}
*{box-sizing:border-box}
html,body{min-height:100%; margin:0; background: radial-gradient(900px 520px at 20% 0%, rgba(30,70,140,.28), rgba(6,10,18,0) 60%), linear-gradient(180deg, #060A12, #050812); color:var(--text); font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;}
#app{min-height:100vh; display:grid; grid-template-columns: minmax(0,1fr) minmax(320px,360px); gap:12px; padding:12px;}
#left{min-width:0; display:flex; flex-direction:column; gap:10px;}
#topbar{display:flex; align-items:center; flex-wrap:wrap; gap:10px; padding:10px 12px; border:1px solid var(--stroke); background:linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.025)); border-radius:10px;}
#brand{display:flex; align-items:center; gap:10px; min-width:220px; font-weight:800; letter-spacing:0;}
#brandMark{width:18px; height:18px; border-radius:6px; background:linear-gradient(135deg,#7CC3FF,#FFD166); opacity:.95; flex:0 0 auto;}
#pill{font-size:12px; padding:4px 8px; border-radius:7px; background:rgba(255,255,255,.08); border:1px solid var(--stroke2); color:var(--muted);}
#controls{display:flex; align-items:center; flex-wrap:wrap; gap:8px;}
.btn{appearance:none; border:1px solid var(--stroke); background:rgba(255,255,255,.045); color:var(--text); padding:8px 10px; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; min-height:36px;}
.btn:hover{background:rgba(255,255,255,.085)}
.btn:active{transform:translateY(1px)}
.btn.toggled{background:rgba(124,195,255,.18); border-color:rgba(124,195,255,.42); box-shadow:inset 0 0 0 1px rgba(124,195,255,.10)}
.btn:focus-visible,#search:focus-visible,.findItem:focus-visible{outline:2px solid var(--focus); outline-offset:2px;}
#searchWrap{margin-left:auto; display:flex; align-items:center; gap:8px; flex:1 1 260px; min-width:220px; max-width:520px;}
#search{width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--stroke); background:rgba(10,18,34,.78); color:var(--text);}
#search::placeholder{color:rgba(231,238,249,.45)}
#plotWrap{flex:1; min-height:420px; border:1px solid var(--stroke); border-radius:10px; overflow:hidden; background:radial-gradient(520px 320px at 18% 28%, rgba(124,195,255,.10), rgba(6,10,18,0) 70%), radial-gradient(420px 300px at 78% 64%, rgba(181,140,255,.09), rgba(6,10,18,0) 72%), linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,0)); position:relative;}
#plotWrap:before{content:""; position:absolute; inset:0; pointer-events:none; background-image:radial-gradient(circle, rgba(231,238,249,.22) 0 1px, transparent 1.4px), radial-gradient(circle, rgba(124,195,255,.16) 0 1px, transparent 1.6px); background-size:80px 80px, 130px 130px; background-position:12px 24px, 50px 70px; opacity:.18;}
#plotWrap:after{content:""; position:absolute; inset:0; pointer-events:none; box-shadow:inset 0 0 80px rgba(0,0,0,.45);}
#plot{width:100%; height:100%; background:var(--bg);}
#plotMask{position:absolute; inset:0; pointer-events:auto;}
#toast{position:absolute; left:14px; bottom:14px; padding:10px 12px; border-radius:12px; background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.12); color:rgba(231,238,249,.92); font-size:12px; display:none;}
#right{display:flex; flex-direction:column; gap:12px; min-width:0;}
.panel{border:1px solid var(--stroke); border-radius:10px; background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.022)); padding:12px;}
.panel h3{margin:0 0 8px 0; font-size:14px; letter-spacing:.2px; color:rgba(231,238,249,.88)}
.small{font-size:12px; color:var(--muted)}
.legendRow{display:flex; align-items:center; gap:10px; width:100%; padding:8px; min-height:38px; border:0; border-top:1px solid var(--stroke2); background:transparent; color:var(--text); text-align:left; cursor:pointer;}
.legendRow:first-of-type{border-top:0}
.legendRow:hover{background:rgba(255,255,255,.05)}
.legendRow.active{background:rgba(124,195,255,.12); box-shadow:inset 3px 0 0 rgba(124,195,255,.72)}
.legendRow:focus-visible{outline:2px solid var(--focus); outline-offset:2px;}
.legendRow:disabled{cursor:not-allowed; opacity:.45;}
.legendRow:disabled:hover{background:transparent;}
.legendCount{margin-left:auto; color:rgba(231,238,249,.46); font-size:11px; font-weight:700;}
.dot{width:10px; height:10px; border-radius:999px; background:#F6D68A; box-shadow:0 0 10px rgba(246,214,138,.35)}
.diamond{width:10px; height:10px; transform:rotate(45deg); background:#6FCBFF}
.moon{width:7px; height:7px; border-radius:999px; background:#91A4BC}
.halo{width:12px; height:12px; border-radius:999px; border:2px solid rgba(124,195,255,.85); background:transparent}
.cap{width:12px; height:12px; border-radius:999px; border:2px solid rgba(255,209,102,.95); background:transparent; position:relative}
.cap:after{content:""; position:absolute; inset:2px; border:2px solid rgba(255,209,102,.62); border-radius:999px}
.blackhole{width:14px; height:14px; border-radius:999px; border:2px solid rgba(247,201,72,.95); background:#050509; box-shadow:0 0 12px rgba(139,92,246,.42)}
.wormhole{width:14px; height:14px; border-radius:999px; border:2px solid rgba(167,139,250,.95); background:radial-gradient(circle, transparent 35%, rgba(34,211,238,.42) 38% 48%, transparent 52%); position:relative; box-shadow:0 0 12px rgba(168,85,247,.35)}
.wormhole:after{content:""; position:absolute; inset:3px; border-top:2px solid rgba(34,211,238,.9); border-radius:999px; transform:rotate(-28deg)}
.conf{width:12px; height:12px; border-radius:999px; border:2px dashed rgba(255,92,122,.95); background:transparent}
.mystery{width:12px; height:12px; border-radius:999px; background:rgba(181,140,255,.72); box-shadow:0 0 12px rgba(181,140,255,.45)}
#detailsHeader{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px;}
#detailsTitle{font-weight:800; font-size:16px; color:rgba(231,238,249,.96)}
#detailsSub{margin-top:3px; color:var(--muted)}
#preview{width:86px; height:86px; border-radius:10px; border:1px solid var(--stroke); background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.18), rgba(0,0,0,0) 60%), rgba(10,18,34,.60); flex:0 0 auto;}
#detailsGrid{display:grid; grid-template-columns: minmax(92px,.7fr) minmax(0,1.3fr); gap:7px 10px; font-size:12px;}
#quickFacts{display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:8px;}
.fact{border:1px solid var(--stroke2); border-radius:8px; padding:8px; background:rgba(255,255,255,.035);}
.factKey{font-size:10px; color:rgba(231,238,249,.56); text-transform:uppercase; letter-spacing:.04em;}
.factVal{font-size:12px; color:rgba(231,238,249,.94); font-weight:750; margin-top:3px; overflow-wrap:anywhere;}
.k{color:rgba(231,238,249,.62)}
.v{color:rgba(231,238,249,.92); font-weight:650; text-align:right; overflow-wrap:anywhere;}
.hr{height:1px; background:var(--stroke2); margin:10px 0}
#findList{max-height:260px; overflow:auto; margin-top:8px; border-radius:10px; border:1px solid var(--stroke2);}
.findItem{display:block; width:100%; padding:9px 10px; border:0; border-top:1px solid var(--stroke2); background:transparent; color:var(--text); text-align:left; cursor:pointer;}
.findItem:first-child{border-top:0}
.findItem:hover,.relatedItem:hover{background:rgba(255,255,255,.05)}
.findName{font-weight:750; font-size:12px}
.findMeta{font-size:11px; color:var(--muted)}
.emptyState{padding:10px; color:var(--muted); font-size:12px; grid-column:1/-1;}
.tagRow{display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-top:8px;}
.tag{border:1px solid var(--stroke2); border-radius:999px; padding:3px 7px; color:rgba(231,238,249,.82); background:rgba(255,255,255,.045); font-size:11px;}
#relatedList{display:flex; flex-direction:column; max-height:220px; overflow:auto; border:1px solid var(--stroke2); border-radius:10px;}
.relatedItem{appearance:none; border:0; border-top:1px solid var(--stroke2); background:transparent; color:var(--text); text-align:left; padding:8px 10px; cursor:pointer;}
.relatedItem:first-child{border-top:0}
.relatedName{font-size:12px; font-weight:750;}
.relatedMeta{font-size:11px; color:var(--muted); margin-top:2px;}
@media (max-width: 980px) {
  #app{grid-template-columns: 1fr; height:auto;}
  #right{display:grid; grid-template-columns: repeat(3, minmax(0,1fr));}
  #topbar{align-items:stretch;}
  #brand{flex:1 1 100%;}
  #controls{flex:1 1 auto;}
  #searchWrap{margin-left:0; max-width:none;}
  #plotWrap{min-height:58vh;}
}
@media (max-width: 720px) {
  #app{padding:8px; gap:8px;}
  #topbar{gap:8px; padding:9px;}
  #controls{display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); width:100%;}
  .btn{width:100%; padding:8px;}
  #searchWrap{flex-basis:100%; min-width:0;}
  #right{display:flex;}
  #plotWrap{min-height:52vh;}
  #detailsGrid{grid-template-columns: 1fr;}
  .v{text-align:left;}
  #quickFacts{grid-template-columns: 1fr;}
  .legendRow{min-height:44px;}
}
@media (max-width: 420px) {
  #brand{min-width:0;}
  #pill{margin-left:auto;}
  .panel{padding:10px;}
}
</style>
</head>
<body>
<div id="app">
  <div id="left">
    <div id="topbar">
      <div id="brand">
        <div id="brandMark" aria-hidden="true"></div>
        <div>Dawn Galaxy Atlas</div>
        <div id="pill" role="status" aria-live="polite">Loading data...</div>
      </div>

      <div id="controls" aria-label="Map controls">
        <button id="btnOrbits" class="btn toggled" type="button" aria-pressed="true" title="Show orbit rings for the selected system">Orbits: Selected</button>
        <button id="btnGlow" class="btn" type="button" aria-pressed="false" title="Toggle atlas effects and halo emphasis">Effects</button>
        <button id="btnGrid" class="btn toggled" type="button" aria-pressed="true" title="Toggle the grid">Grid</button>
        <button id="btnReset" class="btn" type="button" title="Reset view and clear selection">Reset</button>
      </div>

      <div id="searchWrap">
        <input id="search" type="search" autocomplete="off" aria-label="Search atlas objects" placeholder="Search name, system, classification..."/>
      </div>
    </div>

    <div id="plotWrap">
      <div id="plot"></div>
      <div id="plotMask" title="Tap empty space to clear selection"></div>
      <div id="toast"></div>
    </div>
  </div>

  <div id="right">
    <div class="panel">
      <div id="detailsHeader">
        <h3 style="margin:0">Selected Object</h3>
        <div class="small">Click empty map space to clear.</div>
      </div>

      <div style="display:flex; gap:10px; align-items:flex-start">
        <canvas id="preview" width="86" height="86"></canvas>
        <div style="flex:1">
          <div id="detailsTitle">No object selected</div>
          <div class="small" id="detailsSub">Select a star, planet, or moon.</div>
          <div id="detailsTags" class="tagRow"></div>
        </div>
      </div>

      <div class="hr"></div>
      <div id="detailsGrid"></div>
    </div>

    <div class="panel">
      <h3>Quick Facts</h3>
      <div id="quickFacts"></div>
    </div>

    <div class="panel">
      <h3>Same System</h3>
      <div id="relatedList"></div>
    </div>

    <div class="panel">
      <h3>Legend</h3>
      <button class="legendRow" type="button" data-filter="stars" aria-pressed="false"><div class="dot"></div><div class="small" style="flex:1">Stars</div></button>
      <button class="legendRow" type="button" data-filter="planets" aria-pressed="false"><div class="diamond"></div><div class="small" style="flex:1">Planets</div></button>
      <button class="legendRow" type="button" data-filter="moons" aria-pressed="false"><div class="moon"></div><div class="small" style="flex:1">Moons</div></button>
      <button class="legendRow" type="button" data-filter="blackholes" aria-pressed="false"><div class="blackhole"></div><div class="small" style="flex:1">Black holes</div></button>
      <button class="legendRow" type="button" data-filter="wormholes" aria-pressed="false"><div class="wormhole"></div><div class="small" style="flex:1">Wormholes / rifts</div></button>
      <button class="legendRow" type="button" data-filter="core" aria-pressed="false"><div class="halo"></div><div class="small" style="flex:1">Core / homeworld</div></button>
      <button class="legendRow" type="button" data-filter="capital" aria-pressed="false"><div class="cap"></div><div class="small" style="flex:1">Capital / canon locked</div></button>
      <button class="legendRow" type="button" data-filter="conflict" aria-pressed="false"><div class="conf"></div><div class="small" style="flex:1">Conflict / restricted</div></button>
      <button class="legendRow" type="button" data-filter="mystery" aria-pressed="false"><div class="mystery"></div><div class="small" style="flex:1">Mystery / unknown</div></button>
    </div>

    <div class="panel">
      <h3>Find</h3>
      <div class="small">Use the top search. Select a result to jump.</div>
      <div id="findList"></div>
    </div>
  </div>
</div>

<script src="./plotly-2.4.1.min.js"></script>
<script>
(() => {
  "use strict";

  const CSV_URL = "./dawn_atlas.csv";

  const BG = "#060A12";
  const GRID_ON = "rgba(160,190,225,0.12)";
  const GRID_OFF = "rgba(150,170,210,0.00)";
  const AXIS = "rgba(231,238,249,0.24)";
  const ORBIT_SCALE = 2.2;
  const ORBIT_GAP = 1.6;
  const ORBIT_MAX_FRACTION = 0.45;
  const ORBIT_LINE = "rgba(124,195,255,0.32)";
  const PLOT_CONFIG = {
    displayModeBar: true,
    displaylogo: false,
    modeBarButtonsToRemove: ["lasso2d", "select2d", "toggleSpikelines", "hoverCompareCartesian"],
    responsive: true,
    scrollZoom: true
  };

  const pill = document.getElementById("pill");
  const plotEl = document.getElementById("plot");
  const maskEl = document.getElementById("plotMask");
  const toastEl = document.getElementById("toast");

  const btnOrbits = document.getElementById("btnOrbits");
  const btnGlow = document.getElementById("btnGlow");
  const btnGrid = document.getElementById("btnGrid");
  const btnReset = document.getElementById("btnReset");

  const search = document.getElementById("search");
  const findList = document.getElementById("findList");

  const detailsTitle = document.getElementById("detailsTitle");
  const detailsSub = document.getElementById("detailsSub");
  const detailsTags = document.getElementById("detailsTags");
  const detailsGrid = document.getElementById("detailsGrid");
  const quickFacts = document.getElementById("quickFacts");
  const relatedList = document.getElementById("relatedList");
  const legendButtons = Array.from(document.querySelectorAll("[data-filter]"));
  const preview = document.getElementById("preview");
  const pctx = preview.getContext("2d", { willReadFrequently: true });
  const reducedMotionQuery = window.matchMedia ? window.matchMedia("(prefers-reduced-motion: reduce)") : null;

  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
  const safe = (v) => (v === undefined || v === null || String(v).trim() === "" || String(v).trim() === "-") ? "Unknown" : String(v);
  const raw = (v) => (v === undefined || v === null || String(v).trim() === "-" || String(v).trim() === "Unknown") ? "" : String(v).trim();
  const flag = (v) => /^(true|yes|1|y)$/i.test(raw(v));
  const num = (v) => {
    const x = Number(v);
    return Number.isFinite(x) ? x : null;
  };

  function col(row, key) {
    if (!row) return "";
    if (Object.prototype.hasOwnProperty.call(row, key)) return row[key];
    const want = String(key).trim().toLowerCase();
    for (const k in row) {
      if (String(k).trim().toLowerCase() === want) return row[k];
    }
    return "";
  }

  function hash32(str) {
    let h = 0x811c9dc5;
    for (let i=0;i<str.length;i++) {
      h ^= str.charCodeAt(i);
      h = (h + ((h<<1) + (h<<4) + (h<<7) + (h<<8) + (h<<24))) >>> 0;
    }
    return h >>> 0;
  }

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.style.display = "block";
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(() => toastEl.style.display = "none", 2300);
  }

  function el(tag, className, text) {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined) {
      node.textContent = text;
      node.title = text;
    }
    return node;
  }

  function setEmptyFindMessage(text) {
    findList.replaceChildren(el("div", "emptyState", text));
  }

  function setEmptyPanel(node, text) {
    node.replaceChildren(el("div", "emptyState", text));
  }

  function textBag(row) {
    if (!row) return "";
    return Object.keys(row)
      .filter((k) => !String(k).startsWith("__"))
      .map((k) => row[k])
      .join(" ")
      .toLowerCase();
  }

  function classifyRow(row) {
    const type = safe(col(row, "Type"));
    const typeLower = type.toLowerCase();
    const objectType = safe(col(row, "Object_Type")).toUpperCase();
    const bag = textBag(row);
    const canon = safe(col(row, "Canon_Status"));
    const canonName = raw(col(row, "Canon_Name"));
    const canonSource = raw(col(row, "Canon_Source"));
    const book1Star = raw(col(row, "Book1_Canon_Star_Name"));
    const book1Planets = raw(col(row, "Book1_Canon_Planet_Codes"));
    const canonText = `${canon} ${canonName} ${canonSource} ${book1Star} ${book1Planets}`.toLowerCase();
    const isStar = objectType === "STAR" || typeLower.includes("star");
    const isPlanet = objectType === "PLANET" || typeLower.includes("planet");
    const isMoon = objectType === "MOON" || flag(col(row, "Is_Actual_Moon")) || typeLower.includes("moon");
    const isCanon = canonName.length > 0;
    const isBook1 = isCanon && /book\s*1|book1|locked/.test(canonText);
    const isExpansion = isCanon && /post|later|expansion|series/.test(canonText) && !isBook1;
    const isCapital = /capital/.test(bag);
    const isHomeworld = /homeworld/.test(bag);
    const isConflict = flag(col(row, "Is_Conflict_Zone")) || /conflict|restricted|war|forbidden/.test(bag);
    const isMystery = !isCanon && /unknown|unexplored|mystery|hidden|nihility/.test(bag);
    const csvVisualClass = raw(col(row, "Visual_Class")).toUpperCase();
    const isBlackHole = flag(col(row, "Is_Black_Hole")) || csvVisualClass === "BLACK_HOLE" || /black\s*hole/.test(bag);
    const isWormhole = flag(col(row, "Is_Wormhole")) || csvVisualClass === "WORMHOLE_STAR" || /wormhole/.test(bag);
    const isPulsar = flag(col(row, "Is_Pulsar")) || csvVisualClass === "PULSAR" || /pulsar/.test(bag);
    const isMagnetar = flag(col(row, "Is_Magnetar")) || csvVisualClass === "MAGNETAR" || /magnetar|\bmg\b/.test(bag);
    const isDyson = flag(col(row, "Is_Dyson")) || flag(col(row, "Is_Dyson_Linked")) || /dyson/.test(bag);
    const isRift = flag(col(row, "Is_Rift")) || csvVisualClass === "RIFT_WORLD" || /rift/.test(bag);
    const isChronos = /chronos|time/.test(bag);
    const isMirage = /mirage/.test(bag);
    const isSacred = /sacred|ritual/.test(bag);
    const isOcean = /ocean|water/.test(bag);
    let tier = 3;
    let tierName = "Tier 3 Background";
    if (isMystery) {
      tier = 4;
      tierName = "Tier 4 Mystery";
    }
    if (isConflict) {
      tier = 2;
      tierName = "Tier 2 Strategic";
    }
    if (isCanon || isCapital || isHomeworld) {
      tier = 1;
      tierName = "Tier 1 Core Canon";
    }
    let visualClass = csvVisualClass || (isStar ? "STAR" : (isMoon ? "MOON" : "PLANET"));
    if (isBlackHole) visualClass = "BLACK_HOLE";
    else if (isWormhole) visualClass = "WORMHOLE_STAR";
    else if (isPulsar) visualClass = "PULSAR";
    else if (isMagnetar) visualClass = "MAGNETAR";
    else if (isDyson && isStar) visualClass = "DYSON_STAR";
    else if (isConflict) visualClass = "CONFLICT_WORLD";
    else if (/gravity/.test(bag)) visualClass = "GRAVITY_ANOMALY_WORLD";
    else if (isDyson) visualClass = "DYSON_LINKED_WORLD";
    else if (isRift) visualClass = "RIFT_WORLD";
    else if (isChronos) visualClass = "CHRONOS_WORLD";
    else if (isMirage) visualClass = "MIRAGE_WORLD";
    else if (isCapital || /nexus|power/.test(bag)) visualClass = "NEXUS_WORLD";
    else if (isSacred) visualClass = "SACRED_WORLD";
    else if (isOcean && isPlanet) visualClass = "OCEAN_WORLD";
    const canonLabel = isBook1 ? "Book 1 Locked" : (isExpansion ? "Post-Book 1 Expansion" : (isCanon ? "Canon Locked" : "Unverified"));
    const group = isConflict ? "restricted" : (tier === 1 ? "major" : (isMoon ? "moon" : (isStar ? "star" : "planet")));
    return { type, isStar, isPlanet, isMoon, isCanon, isBook1, isExpansion, canonLabel, isCapital, isHomeworld, isConflict, isMystery, isBlackHole, isWormhole, isPulsar, isMagnetar, isDyson, isRift, tier, tierName, visualClass, group };
  }

  function markerSymbol(shape, fallback) {
    const key = String(shape || "").toLowerCase();
    if (key.includes("blackhole") || key.includes("segmented")) return "circle-open";
    if (key.includes("spiral") || key.includes("gravity")) return "circle-open-dot";
    if (key.includes("field")) return "cross";
    if (key.includes("beam")) return "x";
    if (key.includes("diamond")) return "diamond";
    if (key.includes("dot")) return "circle";
    if (key.includes("ring")) return "circle-open";
    return fallback;
  }

  function markerPriority(row) {
    const p = num(col(row, "Label_Priority"));
    return Number.isFinite(p) ? p : 4;
  }

  function tierOpacity(row, info) {
    const priority = markerPriority(row);
    if (info.tier === 1 || priority <= 1) return 0.96;
    if (info.tier === 2 || priority === 2) return 0.68;
    if (info.isMystery || priority === 3) return 0.48;
    return 0.28;
  }

  function makePlanetTexture(key, type) {
    const seed = hash32(String(key));
    const isStar = String(type || "").toLowerCase().includes("star");
    const tw = 256;
    const th = 128;
    const canvas = document.createElement("canvas");
    canvas.width = tw;
    canvas.height = th;
    const ctx = canvas.getContext("2d");
    const rng = makeRng(seed ^ 0x9e3779b9);
    const baseHue = seed % 360;
    const bandCount = 2 + (seed % 3);

    for (let y=0;y<th;y++) {
      const t = y / (th - 1);
      const band = Math.sin(t * Math.PI * 2 * bandCount) * 0.5 + 0.5;
      const hue = (baseHue + band * 30 + (isStar ? 20 : 0)) % 360;
      const sat = isStar ? 75 : 55;
      const light = isStar ? 55 + band * 25 : 30 + band * 25;
      ctx.fillStyle = `hsl(${hue}, ${sat}%, ${light}%)`;
      ctx.fillRect(0, y, tw, 1);
    }

    ctx.globalAlpha = isStar ? 0.25 : 0.18;
    for (let i=0;i<1200;i++) {
      const x = Math.floor(rng() * tw);
      const y = Math.floor(rng() * th);
      const w = 1 + Math.floor(rng() * 3);
      const h = 1 + Math.floor(rng() * 2);
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.fillRect(x, y, w, h);
    }
    ctx.globalAlpha = 0.2;
    for (let i=0;i<300;i++) {
      const x = Math.floor(rng() * tw);
      const y = Math.floor(rng() * th);
      const w = 2 + Math.floor(rng() * 6);
      const h = 1 + Math.floor(rng() * 3);
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(x, y, w, h);
    }
    ctx.globalAlpha = 1;

    return canvas;
  }

  function drawPlanetFrame() {
    const w = preview.width;
    const h = preview.height;
    const r = Math.min(w, h) / 2 - 4;
    const cx = w / 2;
    const cy = h / 2;
    pctx.clearRect(0, 0, w, h);

    const tex = previewState.texture;
    if (!tex) return;

    if (previewState.info?.isStar) {
      drawStarPreview(cx, cy, r);
      return;
    }

    pctx.save();
    pctx.beginPath();
    pctx.arc(cx, cy, r, 0, Math.PI * 2);
    pctx.clip();

    const scale = (r * 2) / tex.height;
    const drawW = tex.width * scale;
    const drawH = tex.height * scale;
    const offset = (previewState.phase * tex.width) % tex.width;
    const startX = cx - r - offset * scale;
    const startY = cy - r;

    pctx.drawImage(tex, startX, startY, drawW, drawH);
    pctx.drawImage(tex, startX + drawW, startY, drawW, drawH);
    pctx.restore();

    const lightX = cx - r * 0.35;
    const lightY = cy - r * 0.35;
    const glow = pctx.createRadialGradient(lightX, lightY, r * 0.15, cx, cy, r);
    glow.addColorStop(0, "rgba(255,255,255,0.55)");
    glow.addColorStop(0.55, "rgba(255,255,255,0.0)");
    glow.addColorStop(1, "rgba(0,0,0,0.55)");
    pctx.fillStyle = glow;
    pctx.beginPath();
    pctx.arc(cx, cy, r, 0, Math.PI * 2);
    pctx.fill();

    const terminator = pctx.createLinearGradient(cx - r, cy, cx + r, cy);
    terminator.addColorStop(0, "rgba(0,0,0,0.45)");
    terminator.addColorStop(0.6, "rgba(0,0,0,0.0)");
    terminator.addColorStop(1, "rgba(0,0,0,0.2)");
    pctx.fillStyle = terminator;
    pctx.beginPath();
    pctx.arc(cx, cy, r, 0, Math.PI * 2);
    pctx.fill();

    pctx.strokeStyle = "rgba(124,195,255,0.28)";
    pctx.lineWidth = 1.4;
    pctx.beginPath();
    pctx.arc(cx, cy, r + 0.5, 0, Math.PI * 2);
    pctx.stroke();
  }

  function drawStarPreview(cx, cy, r) {
    const info = previewState.info || {};
    const isMagnetar = info.visualClass === "MAGNETAR";
    const isPulsar = info.visualClass === "PULSAR";
    const isBlackHole = info.visualClass === "BLACK_HOLE";
    const coreColor = isMagnetar ? "rgba(168,245,255,1)" : (isPulsar ? "rgba(220,242,255,1)" : "rgba(255,238,180,1)");
    const coronaColor = isMagnetar ? "rgba(34,211,238,.55)" : (isPulsar ? "rgba(96,165,250,.45)" : "rgba(255,180,70,.42)");
    if (isBlackHole) {
      const lens = pctx.createRadialGradient(cx, cy, r * 0.25, cx, cy, r * 1.25);
      lens.addColorStop(0, "rgba(0,0,0,1)");
      lens.addColorStop(0.38, "rgba(0,0,0,1)");
      lens.addColorStop(0.48, "rgba(247,201,72,.86)");
      lens.addColorStop(0.7, "rgba(139,92,246,.32)");
      lens.addColorStop(1, "rgba(0,0,0,0)");
      pctx.fillStyle = lens;
      pctx.beginPath();
      pctx.arc(cx, cy, r * 1.2, 0, Math.PI * 2);
      pctx.fill();
      return;
    }

    const halo = pctx.createRadialGradient(cx, cy, r * 0.05, cx, cy, r * 1.45);
    halo.addColorStop(0, coreColor);
    halo.addColorStop(0.35, coronaColor);
    halo.addColorStop(0.72, isMagnetar ? "rgba(239,68,68,.22)" : "rgba(255,209,102,.16)");
    halo.addColorStop(1, "rgba(0,0,0,0)");
    pctx.fillStyle = halo;
    pctx.beginPath();
    pctx.arc(cx, cy, r * 1.45, 0, Math.PI * 2);
    pctx.fill();

    pctx.fillStyle = coreColor;
    pctx.beginPath();
    pctx.arc(cx, cy, r * 0.58, 0, Math.PI * 2);
    pctx.fill();

    const flareCount = isMagnetar ? 9 : 5;
    pctx.save();
    pctx.translate(cx, cy);
    pctx.rotate(previewState.phase * Math.PI * 2);
    for (let i=0;i<flareCount;i++) {
      const a = (Math.PI * 2 * i) / flareCount;
      const len = r * (isMagnetar ? 0.95 : 0.65);
      pctx.strokeStyle = isMagnetar ? "rgba(34,211,238,.68)" : "rgba(255,221,147,.44)";
      pctx.lineWidth = isMagnetar ? 1.5 : 1;
      pctx.beginPath();
      pctx.moveTo(Math.cos(a) * r * 0.48, Math.sin(a) * r * 0.48);
      pctx.lineTo(Math.cos(a + Math.sin(i) * 0.12) * len, Math.sin(a + Math.cos(i) * 0.12) * len);
      pctx.stroke();
    }
    pctx.restore();

    if (isPulsar) {
      pctx.strokeStyle = "rgba(96,165,250,.8)";
      pctx.lineWidth = 2;
      pctx.beginPath();
      pctx.moveTo(cx - r * 1.2, cy + r * 0.35);
      pctx.lineTo(cx + r * 1.2, cy - r * 0.35);
      pctx.stroke();
    }

    pctx.strokeStyle = isMagnetar ? "rgba(34,211,238,.5)" : "rgba(255,209,102,.32)";
    pctx.lineWidth = 1.4;
    pctx.beginPath();
    pctx.arc(cx, cy, r * 0.82, 0, Math.PI * 2);
    pctx.stroke();
  }

  function parseCSV(text) {
    const rows = [];
    let row = [];
    let cell = "";
    let inQuotes = false;

    for (let i=0;i<text.length;i++) {
      const c = text[i];
      const n = text[i+1];

      if (inQuotes) {
        if (c === '"' && n === '"') {
          cell += '"';
          i++;
        } else if (c === '"') {
          inQuotes = false;
        } else {
          cell += c;
        }
      } else {
        if (c === '"') {
          inQuotes = true;
        } else if (c === ',') {
          row.push(cell);
          cell = "";
        } else if (c === '\n' || c === '\r') {
          if (c === '\r' && n === '\n') i++;
          row.push(cell);
          cell = "";
          if (row.length === 1 && row[0].trim() === "") {
            row = [];
            continue;
          }
          rows.push(row);
          row = [];
        } else {
          cell += c;
        }
      }
    }
    if (cell.length || row.length) {
      row.push(cell);
      rows.push(row);
    }
    if (!rows.length) return [];
    const header = rows[0].map(h => h.trim());
    const out = [];
    for (let r=1;r<rows.length;r++) {
      const o = {};
      const rr = rows[r];
      for (let c=0;c<header.length;c++) {
        o[header[c]] = rr[c] !== undefined ? rr[c] : "";
      }
      out.push(o);
    }
    return out;
  }

  function computeBounds(rows) {
    let xmin = Infinity, xmax = -Infinity, ymin = Infinity, ymax = -Infinity;
    for (const r of rows) {
      const x = Number.isFinite(r.__x) ? r.__x : num(col(r, "X"));
      const y = Number.isFinite(r.__y) ? r.__y : num(col(r, "Y"));
      if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
      if (x < xmin) xmin = x;
      if (x > xmax) xmax = x;
      if (y < ymin) ymin = y;
      if (y > ymax) ymax = y;
    }
    if (!Number.isFinite(xmin)) return null;
    return { xmin, xmax, ymin, ymax };
  }

  function buildSystemAnchors(rows) {
    const anchors = new Map();
    for (const r of rows) {
      const sys = safe(col(r, "System Name"));
      const type = safe(col(r, "Type")).toLowerCase();
      const x = num(col(r, "X"));
      const y = num(col(r, "Y"));
      if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
      if (!type.includes("star")) continue;
      const rank = num(col(r, "Star Size Rank"));
      const rankVal = Number.isFinite(rank) ? rank : -Infinity;
      const existing = anchors.get(sys);
      if (!existing || rankVal > existing.rank) {
        anchors.set(sys, { x, y, rank: rankVal });
      }
    }
    for (const r of rows) {
      const sys = safe(col(r, "System Name"));
      if (anchors.has(sys)) continue;
      const x = num(col(r, "X"));
      const y = num(col(r, "Y"));
      if (Number.isFinite(x) && Number.isFinite(y)) {
        anchors.set(sys, { x, y, rank: -Infinity });
      }
    }
    return anchors;
  }

  function computeSystemSpacing(anchors) {
    const items = Array.from(anchors.entries());
    const spacing = new Map();
    for (let i=0;i<items.length;i++) {
      const [sysA, a] = items[i];
      let min = Infinity;
      for (let j=0;j<items.length;j++) {
        if (i === j) continue;
        const [, b] = items[j];
        const d = Math.hypot(a.x - b.x, a.y - b.y);
        if (d < min) min = d;
      }
      spacing.set(sysA, Number.isFinite(min) ? min : 0);
    }
    return spacing;
  }

  function calcOrbitRadius(row) {
    const au = num(col(row, "Distance from Star (AU)"));
    const orbitNum = num(col(row, "Orbit Number"));
    const base = Number.isFinite(au) ? au : (Number.isFinite(orbitNum) ? orbitNum : null);
    if (!Number.isFinite(base)) return null;
    return Math.max(0.5, base * ORBIT_SCALE);
  }

  function orbitAngle(row, system) {
    const name = safe(col(row, "Name"));
    const orbitNum = num(col(row, "Orbit Number")) || 0;
    const seed = hash32(`${system}|${name}`);
    return (seed % 360) * (Math.PI / 180) + orbitNum * 0.45;
  }

  function applyOrbitLayout(rows) {
    SYSTEM_ANCHORS = buildSystemAnchors(rows);
    SYSTEM_ORBITS.clear();
    SYSTEM_SCALE.clear();
    SYSTEM_MAX_ORBIT.clear();

    const systemSpacing = computeSystemSpacing(SYSTEM_ANCHORS);
    const maxBaseBySystem = new Map();
    const planetsBySystem = new Map();
    for (const r of rows) {
      const type = safe(col(r, "Type")).toLowerCase();
      if (!type.includes("planet")) continue;
      const sys = safe(col(r, "System Name"));
      r.__orbit = null;
      r.__orbitBase = calcOrbitRadius(r);
      if (Number.isFinite(r.__orbitBase)) {
        const prev = maxBaseBySystem.get(sys);
        if (!Number.isFinite(prev) || r.__orbitBase > prev) {
          maxBaseBySystem.set(sys, r.__orbitBase);
        }
      }
      if (!planetsBySystem.has(sys)) planetsBySystem.set(sys, []);
      planetsBySystem.get(sys).push(r);
    }

    for (const [sys, maxBase] of maxBaseBySystem.entries()) {
      const minDist = systemSpacing.get(sys);
      let scale = 1;
      if (Number.isFinite(maxBase) && maxBase > 0 && Number.isFinite(minDist) && minDist > 0) {
        const maxAllowed = minDist * ORBIT_MAX_FRACTION;
        scale = Math.min(1, maxAllowed / maxBase);
      }
      if (!Number.isFinite(scale) || scale <= 0) scale = 1;
      SYSTEM_SCALE.set(sys, Math.max(0.05, scale));
    }

    for (const [sys, items] of planetsBySystem.entries()) {
      const scale = SYSTEM_SCALE.get(sys) ?? 1;
      const gap = ORBIT_GAP * scale;
      items.sort((a, b) => {
        const ra = a.__orbitBase;
        const rb = b.__orbitBase;
        if (!Number.isFinite(ra) && !Number.isFinite(rb)) return 0;
        if (!Number.isFinite(ra)) return 1;
        if (!Number.isFinite(rb)) return -1;
        return ra - rb;
      });
      let last = null;
      for (const r of items) {
        let radius = r.__orbitBase;
        if (!Number.isFinite(radius)) {
          r.__orbit = null;
          continue;
        }
        radius *= scale;
        if (last !== null && radius < last + gap) {
          radius = last + gap;
        }
        r.__orbit = radius;
        last = radius;
        const prevMax = SYSTEM_MAX_ORBIT.get(sys) || 0;
        if (radius > prevMax) SYSTEM_MAX_ORBIT.set(sys, radius);
      }
    }

    for (const r of rows) {
      const baseX = num(col(r, "X"));
      const baseY = num(col(r, "Y"));
      const sys = safe(col(r, "System Name"));
      const anchor = SYSTEM_ANCHORS.get(sys);
      const ax = anchor ? anchor.x : baseX;
      const ay = anchor ? anchor.y : baseY;
      const type = safe(col(r, "Type")).toLowerCase();

      if (type.includes("planet") && Number.isFinite(r.__orbit) && Number.isFinite(ax) && Number.isFinite(ay)) {
        const ang = orbitAngle(r, sys);
        r.__x = ax + Math.cos(ang) * r.__orbit;
        r.__y = ay + Math.sin(ang) * r.__orbit;
        if (!SYSTEM_ORBITS.has(sys)) SYSTEM_ORBITS.set(sys, new Set());
        SYSTEM_ORBITS.get(sys).add(r.__orbit);
      } else {
        r.__x = baseX;
        r.__y = baseY;
      }
    }
  }

  function buildOrbitShapes(system) {
    const anchor = SYSTEM_ANCHORS.get(system);
    if (!anchor) return [];
    const set = SYSTEM_ORBITS.get(system);
    if (!set || !set.size) return [];
    const radii = Array.from(set).sort((a, b) => a - b);
    return radii.map((r) => ({
      type: "circle",
      xref: "x",
      yref: "y",
      x0: anchor.x - r,
      x1: anchor.x + r,
      y0: anchor.y - r,
      y1: anchor.y + r,
      line: { color: ORBIT_LINE, width: 1, dash: "dot" },
      fillcolor: "rgba(0,0,0,0)",
      layer: "below"
    }));
  }

  function updateOrbitRings(row) {
    if (orbitsMode !== "selected" || !row) {
      Plotly.relayout(plotEl, { shapes: [] });
      return;
    }
    const system = safe(col(row, "System Name"));
    Plotly.relayout(plotEl, { shapes: buildOrbitShapes(system) });
  }

  async function fetchWithTimeout(url, timeoutMs) {
    if (typeof AbortController === "undefined") {
      return fetch(url, { cache: "no-cache" });
    }
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      return await fetch(url, { cache: "no-cache", signal: controller.signal });
    } finally {
      clearTimeout(timer);
    }
  }

  async function loadCsvText() {
    try {
      const res = await fetchWithTimeout(CSV_URL, 30000);
      if (!res.ok) throw new Error(`CSV load failed (${res.status})`);
      return await res.text();
    } catch (err) {
      throw new Error("CSV load failed. Serve this folder over HTTP (python -m http.server) and open http://localhost:8000/dawn-atlas/.");
    }
  }

  let ALL = [];
  let BY_ID = new Map();
  let SYSTEM_ANCHORS = new Map();
  let SYSTEM_ORBITS = new Map();
  let SYSTEM_SCALE = new Map();
  let SYSTEM_MAX_ORBIT = new Map();
  let bounds = null;
  let selectedId = null;
  let isGridOn = true;
  let isGlowOn = false;
  let orbitsMode = "selected";
  let clickedPoint = false;
  let activeLegendFilter = null;
  let BASE_LABEL_IDS = new Set();
  const TRACE = {
    glow: 0,
    stars: 1,
    planets: 2,
    moons: 3,
    major: 4,
    restricted: 5,
    labels: 6,
    selected: 7
  };

  function syncControlState() {
    btnGrid.classList.toggle("toggled", isGridOn);
    btnGrid.setAttribute("aria-pressed", String(isGridOn));
    btnGrid.textContent = isGridOn ? "Grid: On" : "Grid: Off";
    btnGlow.classList.toggle("toggled", isGlowOn);
    btnGlow.setAttribute("aria-pressed", String(isGlowOn));
    btnGlow.textContent = isGlowOn ? "Effects: On" : "Effects: Off";
    btnOrbits.classList.toggle("toggled", orbitsMode === "selected");
    btnOrbits.setAttribute("aria-pressed", String(orbitsMode === "selected"));
    btnOrbits.textContent = orbitsMode === "selected" ? "Orbits: On" : "Orbits: Off";
    for (const button of legendButtons) {
      const isActive = button.dataset.filter === activeLegendFilter;
      const count = countLegendMatches(button.dataset.filter);
      const label = button.dataset.label || button.querySelector(".small")?.textContent.trim() || button.textContent.trim();
      button.classList.toggle("active", isActive);
      button.disabled = count === 0;
      button.setAttribute("aria-pressed", String(isActive));
      button.title = count === 0 ? `No ${label.toLowerCase()} in this atlas data` : (isActive ? "Tap again to show all atlas objects" : `Show only ${label}`);
      const text = button.querySelector(".small");
      if (text) text.textContent = label;
      let countNode = button.querySelector(".legendCount");
      if (!countNode) {
        countNode = document.createElement("span");
        countNode.className = "legendCount";
        button.appendChild(countNode);
      }
      countNode.textContent = count;
    }
  }

  function countLegendMatches(filter) {
    if (!filter || !ALL.length) return ALL.length;
    let count = 0;
    for (const row of ALL) {
      if (matchesLegendFilter(row, filter)) count++;
    }
    return count;
  }

  function matchesLegendFilter(row, filter = activeLegendFilter) {
    if (!filter) return true;
    const info = row.__info || classifyRow(row);
    const objectType = safe(col(row, "Object_Type")).toUpperCase();
    const visualClass = safe(col(row, "Visual_Class")).toUpperCase();
    switch (filter) {
      case "stars":
        return (objectType === "STAR" || info.isStar) && !info.isBlackHole && !info.isWormhole && !info.isRift && !info.isPulsar && !info.isMagnetar && !info.isDyson;
      case "planets":
        return (objectType === "PLANET" || info.isPlanet) && !info.isConflict && !info.isRift && !info.isDyson && visualClass !== "CONFLICT_WORLD" && visualClass !== "RIFT_WORLD" && visualClass !== "DYSON_LINKED_WORLD";
      case "moons":
        return objectType === "MOON" || info.isMoon;
      case "blackholes":
        return flag(col(row, "Is_Black_Hole")) || visualClass === "BLACK_HOLE" || info.isBlackHole;
      case "wormholes":
        return flag(col(row, "Is_Wormhole")) || flag(col(row, "Is_Rift")) || visualClass === "WORMHOLE_STAR" || visualClass === "RIFT_WORLD" || info.isWormhole || info.isRift;
      case "core":
        return safe(col(row, "Story_Tier")).toLowerCase() === "core" || info.tier === 1 || info.isHomeworld || info.isCanon;
      case "capital":
        return info.isCapital || info.isCanon;
      case "conflict":
        return flag(col(row, "Is_Conflict_Zone")) || visualClass === "CONFLICT_WORLD" || info.isConflict;
      case "mystery":
        return info.isMystery || safe(col(row, "Story_Tier")).toLowerCase() === "mystery";
      default:
        return true;
    }
  }

  function pushPoint(bucket, row) {
    const x = Number.isFinite(row.__x) ? row.__x : num(col(row, "X"));
    const y = Number.isFinite(row.__y) ? row.__y : num(col(row, "Y"));
    if (!Number.isFinite(x) || !Number.isFinite(y)) return;
    const marker = markerFor(row);
    bucket.x.push(x);
    bucket.y.push(y);
    bucket.ids.push(row.__id);
    bucket.text.push(hoverText(row));
    bucket.color.push(marker.color);
    bucket.size.push(marker.size);
    bucket.symbol.push(marker.symbol);
    bucket.opacity.push(marker.opacity);
    bucket.lineColor.push(marker.line.color);
    bucket.lineWidth.push(marker.line.width);
  }

  function makeBucket() {
    return { x: [], y: [], ids: [], text: [], color: [], size: [], symbol: [], opacity: [], lineColor: [], lineWidth: [] };
  }

  function markerTrace(name, bucket) {
    return {
      type: "scattergl",
      mode: "markers",
      name,
      x: bucket.x,
      y: bucket.y,
      customdata: bucket.ids,
      hovertemplate: "%{text}<extra></extra>",
      text: bucket.text,
      marker: {
        size: bucket.size,
        color: bucket.color,
        symbol: bucket.symbol,
        opacity: bucket.opacity,
        line: { color: bucket.lineColor, width: bucket.lineWidth }
      }
    };
  }

  function buildTraces() {
    const buckets = {
      stars: makeBucket(),
      planets: makeBucket(),
      moons: makeBucket(),
      major: makeBucket(),
      restricted: makeBucket()
    };
    const labelX = [];
    const labelY = [];
    const labelText = [];
    const labelIds = [];
    const glowX = [];
    const glowY = [];
    const glowSize = [];
    const glowColor = [];

    BASE_LABEL_IDS = new Set();
    for (let i=0;i<ALL.length;i++) {
      const r = ALL[i];
      const x = Number.isFinite(r.__x) ? r.__x : num(col(r, "X"));
      const y = Number.isFinite(r.__y) ? r.__y : num(col(r, "Y"));
      if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
      const info = r.__info || classifyRow(r);
      if (!matchesLegendFilter(r)) continue;
      pushPoint(buckets[info.group] || buckets.planets, r);

      if (markerPriority(r) <= 1 && labelText.length < 12) {
        labelX.push(x);
        labelY.push(y);
        labelText.push(safe(col(r, "Name")));
        labelIds.push(r.__id);
        BASE_LABEL_IDS.add(r.__id);
      }
      if (info.tier <= 2 || markerPriority(r) <= 2 || info.isBlackHole || info.isWormhole || info.isRift) {
        const marker = markerFor(r);
        glowX.push(x);
        glowY.push(y);
        glowSize.push(marker.size * (info.tier === 1 ? 2.6 : 2.1));
        glowColor.push(marker.color);
      }
    }

    const glowTrace = {
      type: "scattergl",
      mode: "markers",
      x: glowX,
      y: glowY,
      hoverinfo: "skip",
      visible: isGlowOn,
      marker: {
        size: glowSize,
        color: glowColor,
        opacity: 0.16
      }
    };

    const labelsTrace = {
      type: "scatter",
      mode: "text",
      x: labelX,
      y: labelY,
      customdata: labelIds,
      hoverinfo: "skip",
      text: labelText,
      textposition: "middle right",
      textfont: { color: "rgba(231,238,249,0.62)", size: 9 }
    };

    const selectTrace = {
      type: "scattergl",
      mode: "markers",
      x: [],
      y: [],
      hoverinfo: "skip",
      marker: {
        size: 24,
        color: "rgba(0,0,0,0)",
        symbol: "circle-open",
        line: { color: "rgba(255,209,102,0.96)", width: 3 }
      }
    };

    return [
      glowTrace,
      markerTrace("Stars", buckets.stars),
      markerTrace("Planets", buckets.planets),
      markerTrace("Moons", buckets.moons),
      markerTrace("Core worlds", buckets.major),
      markerTrace("Restricted", buckets.restricted),
      labelsTrace,
      selectTrace
    ];
  }

  function labelPayload(selectedRow) {
    const rows = ALL.filter((r) => BASE_LABEL_IDS.has(r.__id)).slice(0, 12);
    if (selectedRow && !BASE_LABEL_IDS.has(selectedRow.__id)) rows.push(selectedRow);
    const x = [];
    const y = [];
    const text = [];
    const ids = [];
    for (const row of rows) {
      const px = Number.isFinite(row.__x) ? row.__x : num(col(row, "X"));
      const py = Number.isFinite(row.__y) ? row.__y : num(col(row, "Y"));
      if (!Number.isFinite(px) || !Number.isFinite(py)) continue;
      x.push(px);
      y.push(py);
      text.push(safe(col(row, "Name")));
      ids.push(row.__id);
    }
    return { x, y, text, ids };
  }

  function updateMapLabels(selectedRow) {
    const labels = labelPayload(selectedRow);
    Plotly.restyle(plotEl, {
      x: [labels.x],
      y: [labels.y],
      text: [labels.text],
      customdata: [labels.ids]
    }, [TRACE.labels]);
  }

  async function refreshMapForFilter() {
    if (selectedId) {
      const selected = BY_ID.get(selectedId);
      if (selected && !matchesLegendFilter(selected)) {
        selectedId = null;
        renderDetails(null);
        updateOrbitRings(null);
      }
    }
    await Plotly.react(plotEl, buildTraces(), baseLayout(), PLOT_CONFIG);
    if (selectedId) setSelectedById(selectedId, { zoom: false });
    else updateMapLabels(null);
  }

  function baseLayout() {
    const pad = bounds ? Math.max((bounds.xmax - bounds.xmin) * 0.05, 6) : 10;
    const xRange = bounds ? [bounds.xmin - pad, bounds.xmax + pad] : [0, 100];
    const yRange = bounds ? [bounds.ymin - pad, bounds.ymax + pad] : [0, 100];

    return {
      paper_bgcolor: BG,
      plot_bgcolor: BG,
      margin: { l: 40, r: 20, t: 20, b: 40 },
      xaxis: {
        showgrid: isGridOn,
        gridcolor: isGridOn ? GRID_ON : GRID_OFF,
        zeroline: false,
        color: AXIS,
        range: xRange,
        fixedrange: false
      },
      yaxis: {
        showgrid: isGridOn,
        gridcolor: isGridOn ? GRID_ON : GRID_OFF,
        zeroline: false,
        color: AXIS,
        range: yRange,
        fixedrange: false
      },
      hovermode: "closest",
      showlegend: false
    };
  }

  function zoomTo(row) {
    if (!row || !bounds) return;
    const x = Number.isFinite(row.__x) ? row.__x : num(col(row, "X"));
    const y = Number.isFinite(row.__y) ? row.__y : num(col(row, "Y"));
    if (!Number.isFinite(x) || !Number.isFinite(y)) return;
    const system = safe(col(row, "System Name"));
    const systemMax = SYSTEM_MAX_ORBIT.get(system);
    let span = Math.max((bounds.xmax - bounds.xmin), (bounds.ymax - bounds.ymin)) * 0.12;
    if (Number.isFinite(systemMax)) {
      span = Math.max(systemMax * 1.8, 12);
    }
    Plotly.relayout(plotEl, {
      "xaxis.range": [x - span, x + span],
      "yaxis.range": [y - span, y + span]
    });
  }

  function setSelectedById(id) {
    selectedId = id;
    if (!id) {
      Plotly.restyle(plotEl, { x: [[]], y: [[]] }, [TRACE.selected]);
      updateMapLabels(null);
      renderDetails(null);
      updateOrbitRings(null);
      return;
    }
    const row = BY_ID.get(id);
    if (!row) {
      renderDetails(null);
      updateOrbitRings(null);
      return;
    }
    const x = Number.isFinite(row.__x) ? row.__x : num(col(row, "X"));
    const y = Number.isFinite(row.__y) ? row.__y : num(col(row, "Y"));
    if (Number.isFinite(x) && Number.isFinite(y)) {
      Plotly.restyle(plotEl, { x: [[x]], y: [[y]] }, [TRACE.selected]);
    }
    updateMapLabels(row);
    renderDetails(row);
    updateOrbitRings(row);
  }

  function updateFindList(q) {
    const query = (q || "").trim().toLowerCase();
    findList.replaceChildren();
    if (!query) {
      setEmptyFindMessage("Enter a search term to list matching objects.");
      return;
    }

    const rows = [];
    for (const r of ALL) {
      const nm = safe(col(r, "Name")).toLowerCase();
      const sys = safe(col(r, "System Name")).toLowerCase();
      const cls = safe(col(r, "Classification")).toLowerCase();
      const typ = safe(col(r, "Type")).toLowerCase();
      if (nm.includes(query) || sys.includes(query) || cls.includes(query) || typ.includes(query)) {
        rows.push(r);
      }
      if (rows.length >= 40) break;
    }

    if (!rows.length) {
      setEmptyFindMessage("No matching objects found.");
      return;
    }

    for (const r of rows) {
      const item = document.createElement("button");
      item.className = "findItem";
      item.type = "button";
      const name = safe(col(r, "Name"));
      const meta = `${safe(col(r, "Type"))} | ${safe(col(r, "System Name"))} | ${safe(col(r, "Classification"))}`;
      item.append(el("div", "findName", name), el("div", "findMeta", meta));
      item.addEventListener("click", () => {
        setSelectedById(r.__id);
        zoomTo(r);
      });
      findList.appendChild(item);
    }
  }

  async function resetAtlasView() {
    selectedId = null;
    activeLegendFilter = null;
    search.value = "";
    updateFindList("");
    renderDetails(null);
    updateOrbitRings(null);
    syncControlState();
    await Plotly.react(plotEl, buildTraces(), baseLayout(), PLOT_CONFIG);
    updateMapLabels(null);
    Plotly.restyle(plotEl, { x: [[]], y: [[]] }, [TRACE.selected]);
    Plotly.relayout(plotEl, {
      "xaxis.autorange": true,
      "yaxis.autorange": true,
      shapes: []
    });
  }

  function hookEvents() {
    if (maskEl) maskEl.style.pointerEvents = "none";

    plotEl.on("plotly_click", (ev) => {
      if (!ev.points || !ev.points.length) return;
      clickedPoint = true;
      const id = ev.points[0].customdata;
      if (!id) return;
      setSelectedById(id);
    });

    plotEl.addEventListener("click", () => {
      setTimeout(() => {
        if (clickedPoint) {
          clickedPoint = false;
          return;
        }
        setSelectedById(null);
      }, 0);
    });

    btnGrid.addEventListener("click", () => {
      isGridOn = !isGridOn;
      syncControlState();
      Plotly.relayout(plotEl, {
        "xaxis.showgrid": isGridOn,
        "yaxis.showgrid": isGridOn,
        "xaxis.gridcolor": isGridOn ? GRID_ON : GRID_OFF,
        "yaxis.gridcolor": isGridOn ? GRID_ON : GRID_OFF
      });
    });

    btnGlow.addEventListener("click", () => {
      isGlowOn = !isGlowOn;
      syncControlState();
      Plotly.restyle(plotEl, { visible: isGlowOn }, [TRACE.glow]);
    });

    btnOrbits.addEventListener("click", () => {
      if (orbitsMode === "selected") {
        orbitsMode = "off";
      } else {
        orbitsMode = "selected";
      }
      syncControlState();
      updateOrbitRings(selectedId ? BY_ID.get(selectedId) : null);
    });

    btnReset.addEventListener("click", () => {
      resetAtlasView();
    });

    for (const button of legendButtons) {
      button.addEventListener("click", async () => {
        const count = countLegendMatches(button.dataset.filter);
        if (count === 0) {
          toast(`No ${button.querySelector(".small")?.textContent.trim() || "objects"} in this atlas data`);
          return;
        }
        const nextFilter = button.dataset.filter;
        activeLegendFilter = activeLegendFilter === nextFilter ? null : nextFilter;
        syncControlState();
        await refreshMapForFilter();
        toast(activeLegendFilter ? `Showing ${button.querySelector(".small")?.textContent.trim() || "selection"} only` : "Showing all atlas objects");
      });
    }

    search.addEventListener("input", () => updateFindList(search.value));
  }

  async function init() {
    try {
      pill.textContent = "Loading data...";
      renderDetails(null);

      if (!window.Plotly) throw new Error("Plotly failed to load");

      const text = await loadCsvText();
      ALL = parseCSV(text);
      if (!ALL.length) throw new Error("No rows found in CSV");
      applyOrbitLayout(ALL);
      bounds = computeBounds(ALL);

      BY_ID.clear();
      for (let i=0;i<ALL.length;i++) {
        const r = ALL[i];
        r.__id = `${safe(col(r, "System Name"))}|${safe(col(r, "Name"))}|${safe(col(r, "Type"))}|${i}`;
        r.__info = classifyRow(r);
        BY_ID.set(r.__id, r);
      }

      const traces = buildTraces();
      await Plotly.newPlot(plotEl, traces, baseLayout(), PLOT_CONFIG);

      const hasBook1 = ALL.some((row) => classifyRow(row).isBook1);
      pill.textContent = hasBook1 ? "Book 1 Locked" : "Atlas Online";
      hookEvents();
      syncControlState();
      updateFindList("");
      setSelectedById(null);
    } catch (err) {
      pill.textContent = "Error";
      toast(`Map error: ${err.message || err}`);
      console.error(err);
    }
  }

  init();
})();
</script>
